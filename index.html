<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Taman Bunga 3D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
</head>
<body>
<div id="app-container">

  <h2 class="sr-only" style="position: absolute; width: 1px; height: 1px; overflow: hidden;">Taman bunga 3D interaktif dengan animasi mekar, putar, dan kontrol warna serta angin</h2>
  <div id="canvas-wrap" style="width: 100%; height: 100%;"></div>

  <div class="top-layout">
    <div class="btn-group">
      <button id="bloom-btn" class="flower-btn"><i class="fa-solid fa-seedling" aria-hidden="true"></i> Mekarkan</button>
      <button id="wind-btn" class="flower-btn"><i class="fa-solid fa-wind" aria-hidden="true"></i> Angin</button>
      <button id="add-btn" class="flower-btn"><i class="fa-solid fa-plus" aria-hidden="true"></i> Tambah bunga</button>
    </div>
    <div class="flower-panel drag-hint" style="font-size: 12px; font-weight: 600; border-radius: 20px; padding: 6px 14px; pointer-events: none; white-space: nowrap;">
      Seret untuk memutar
    </div>
  </div>

  <div class="flower-panel bottom-panel">
    <i class="fa-solid fa-palette" aria-hidden="true" style="font-size: 20px; color: #d81b60;"></i>
    <input type="range" id="hue" min="0" max="360" value="330" step="1" style="flex: 1; accent-color: #d81b60; cursor: pointer;" />
    <span id="hue-out" style="font-size: 14px; font-weight: 600; min-width: 36px; text-align: right; color: #d81b60;">330</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>
</body>
</html>
